name: Deploy QRadar Rules

on:
  push:
    paths:
      - "rules/*.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy rules to QRadar
        run: |
          for file in rules/*.json; do
            echo "------------------------------------------------------"
            echo "Processing file: $file"
            
            # QRadar bEzi versiyalarda bu yolu istifadE edir: /api/analytics/custom_rules
            # eger bu da 404 verse, /api/analytics/rules/ hissesinin sonuna bir / elave etmeliyik
            RESPONSE=$(curl -k -s -o /dev/null -w "%{http_code}" -X POST "https://${{ secrets.QRADAR_HOST }}/api/analytics/custom_rules" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "SEC: ${{ secrets.QRADAR_API_TOKEN }}" \
              --data @"$file")

            echo "QRadar Response (HTTP Status): $RESPONSE"
            
            if [ "$RESPONSE" == "201" ] || [ "$RESPONSE" == "200" ]; then
              echo "Success: $file uploaded."
            else
              echo "Failed with $RESPONSE. Retrying with alternative endpoint..."
              # Alternativ endpoint yoxlanışı
              RESPONSE_ALT=$(curl -k -s -o /dev/null -w "%{http_code}" -X POST "https://${{ secrets.QRADAR_HOST }}/api/analytics/rules" \
                -H "Content-Type: application/json" \
                -H "SEC: ${{ secrets.QRADAR_API_TOKEN }}" \
                --data @"$file")
              echo "Alternative Response: $RESPONSE_ALT"
            fi
          done

      - name: Apply Changes
        run: |
          echo "Triggering Deploy..."
          # Deploy yolu mutleq budur, eger 404 SEC Token icazesi çatm
          curl -k -X POST "https://${{ secrets.QRADAR_HOST }}/api/system/staged_config/deploy" \
            -H "SEC: ${{ secrets.QRADAR_API_TOKEN }}"
