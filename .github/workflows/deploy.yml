name: Deploy QRadar Rules

on:
  push:
    paths:
      - "rules/*.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy rules to QRadar
        run: |
          for file in rules/*.json; do
            echo "Deploying $file to QRadar..."
            curl -X POST "https://${{ secrets.QRADAR_HOST }}/api/config/rules" \
              -H "Content-Type: application/json" \
              -H "SEC: ${{ secrets.QRADAR_API_TOKEN }}" \
              --data @"$file"
          done

