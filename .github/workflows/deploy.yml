name: Deploy QRadar Extension

on:
  push:
    paths:
      - "rules/*.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Extension Zip
        run: |
          # Packaging rules into a zip file for QRadar Extension Management
          zip -r extension.zip rules/

      - name: Upload Extension to QRadar
        run: |
          echo "Uploading extension to QRadar Extension Management..."
          # Using the endpoint confirmed from your API documentation: /api/config/extension_management/extensions
          RESPONSE=$(curl -k -s -o /dev/null -w "%{http_code}" -X POST "https://${{ secrets.QRADAR_HOST }}/api/config/extension_management/extensions" \
            -H "SEC: ${{ secrets.QRADAR_API_TOKEN }}" \
            -H "Accept: application/json" \
            -F "file=@extension.zip")
          
          echo "Upload Status: $RESPONSE"
          if [ "$RESPONSE" == "201" ] || [ "$RESPONSE" == "200" ]; then
            echo "Success: Extension uploaded to QRadar."
          else
            echo "Error: Failed to upload. Received HTTP $RESPONSE"
            exit 1
          fi

      - name: Trigger Deploy
        run: |
          echo "Triggering global deployment in QRadar..."
          # Using the universal config deploy endpoint
          curl -k -X POST "https://${{ secrets.QRADAR_HOST }}/api/config/deploy" \
            -H "SEC: ${{ secrets.QRADAR_API_TOKEN }}"
